<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线索解谜小游戏</title>
    <style>
      * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", sans-serif;
}

body {
    background: #f7f9fc;
    padding: 20px;
}

.page {
    max-width: 500px;
    margin: 0 auto;
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 0 12px #00000010;
    min-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

img {
    width: 300px;
    height: 300px;
    object-fit: cover;
    margin: 20px 0;
    border-radius: 8px;
    background: #eee;
    /* 强制所有图片居中 */
    display: block;
    margin-left: auto;
    margin-right: auto;
}

.img-wide {
    width: 90% !important;
    height: 250px !important;
    margin-top: 30px !important; /* 增加上边距，避开气泡 */
}

.img-small {
    width: 120px !important;
    height: 120px !important;
}

.text {
    font-size: 20px;
    text-align: center;
    margin: 20px auto;
    line-height: 1.5;
    width: 80%;
    max-width: 400px;
}

input {
    width: 80% !important;
    max-width: 400px !important;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    margin: 10px 0;
    outline: none;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

button {
    width: 80% !important;
    max-width: 400px !important;
    padding: 12px;
    background: #007aff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    margin: 8px 0;
    cursor: pointer;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

button:active {
    background: #0066cc;
}

.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    width: 90%;
    max-width: 450px;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 0 20px #00000020;
    text-align: center;
    z-index: 99;
}

.mask {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #00000050;
    z-index: 98;
}

.flex-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
    width: 80%;
    max-width: 400px;
}

.flex-row span {
    font-size: 40px;
}

.box {
    background: #fff8e1;
    border: 1px solid #ccc;
    padding: 5px 10px !important;
}

.title {
    font-size: 30px;
    color: red;
    font-weight: bold;
    text-align: center;
    margin: 40px auto 20px;
    width: 80%;
    max-width: 400px;
}
.tip {
    font-size: 16px;
    color: #888;
    margin-top: 20px;
    text-align: center;
    width: 80%;
    max-width: 400px;
}
.hide {
    display: none !important;
}
.clickable {
    color: #007aff;
    cursor: pointer;
    text-decoration: underline;
}
    </style>
</head>

<body>
    <!-- ========== 页面1 ========== -->
    <div id="page1" class="page">
        <img src="character1.png" alt="角色">
        <div class="text" id="msg1">我得到了一串神秘数字，需要破解出一个由数字和字母组成的5位密码，但我不知道如何破译它。</div>
        <button onclick="showClue()">查看线索</button>
        <input id="pwd1" placeholder="请输入密码">
        <button onclick="checkPwd1()">确认进入下一关</button>
    </div>

    <!-- 线索弹窗 -->
    <div id="clueModal" class="hide">
        <div class="mask"></div>
        <div class="modal">
            <img class="img-small" src="character2.jpg" alt="线索">
            <div class="text">梨梨原来是青提，你还记得青提的心有灵犀中有一个词对应的诗是什么吗？</div>
            <button onclick="closeClue()">关闭</button>
        </div>
    </div>

    <!-- ========== 页面2 ========== -->
    <div id="page2" class="page hide">
        <div id="puzzle2">
            <div class="text" style="font-size:50px;font-weight:bold;">i6i65</div>
            <img class="img-wide" src="puzzle_img.jpg" alt="谜题">
            <button onclick="showHint()">查看提示</button>
            <input id="ans2" placeholder="请输入答案（四字）">
            <button onclick="checkAns2()">确认答案</button>
        </div>

       <div id="success2" class="hide" style="text-align:center;">
    <div id="codeBox" style="font-size:50px; font-weight:bold; margin:30px 0; display:flex; gap:10px; justify-content:center;">
    <span>1</span>
    <span class="clickable" id="toF" onclick="toF()">6</span>
    <span class="clickable" id="toA" onclick="toA()">1</span>
    <span>6</span>
    <span>5</span>
</div>

    <button id="toPage3Btn" class="hide" onclick="goPage3()">完成 1FA65，进入下一关</button>
</div>
    </div>

    <!-- 提示弹窗 -->
    <div id="hintModal" class="hide">
        <div class="mask"></div>
        <div class="modal">
           <video 
  width="100%" 
  height="200" 
  autoplay 
  muted 
  loop 
  controls
>
  <source src="hint.mp4" type="video/mp4">
</video>
            <button onclick="closeHint()">关闭</button>
        </div>
    </div>

    <!-- ========== 页面3 ========== -->
    <div id="page3" class="page hide">
        <div style="font-size:50px;font-weight:bold;margin:30px 0;">1FA65</div>
        <div class="text">输入正确**进入下一关</div>
        <input id="ans3" placeholder="请输入指定**的中文（6字）">
        <button onclick="checkAns3()">确认</button>
    </div>

    <!-- ========== 页面4 ========== -->
    <div id="page4" class="page hide">
        <!-- 输入答案 -->
        <div id="step4-1">
            <img class="img-wide" src="puzzle4.png" alt="谜题4">
            <div class="text">输入关键词解开最终谜题</div>
            <input id="ans4" placeholder="请输入关键词">
            <button onclick="checkAns4()">确认提交</button>
        </div>

        <!-- 拆红包 -->
        <div id="step4-2" class="hide" style="text-align:center;">
            <div class="text" style="font-size:24px;font-weight:bold;">🎉 恭喜解开谜题！</div>
            <img src="red_packet.jpg" alt="红包" onclick="openRedPacket()">
        </div>

        <!-- 通关成功 -->
        <div id="step4-3" class="hide" style="text-align:center;">
            <div class="title">🎉 恭喜你成功通关找到宝藏！🎉</div>
            <img class="img-wide" src="coupon.png" alt="优惠券">
            <div class="text" style="font-size:22px;">愿你好运常伴，红包多多，万事顺遂！</div>
            <div class="tip">✨ 感谢游玩qq的解谜小游戏 ✨</div>
        </div>
    </div>

    <script>
        // ========== 页面1 ==========
        function showClue() {
            document.getElementById("clueModal").classList.remove("hide");
        }
        function closeClue() {
            document.getElementById("clueModal").classList.add("hide");
        }
        function checkPwd1() {
            let pwd = document.getElementById("pwd1").value.trim();
            if (pwd === "i6i65") {
                document.getElementById("page1").classList.add("hide");
                document.getElementById("page2").classList.remove("hide");
            } else {
                document.getElementById("msg1").innerText = "密码错误，请重试！";
            }
        }

        // ========== 页面2 ==========
function showHint() {
    document.getElementById("hintModal").classList.remove("hide");
}
function closeHint() {
  document.getElementById("hintModal").classList.add("hide");
  // 停止视频播放
  let video = document.querySelector("#hintModal video");
  video.pause();
  video.currentTime = 0; // 重置到开头
}
function checkAns2() {
    let ans = document.getElementById("ans2").value.trim();
    if (ans === "富士山下") {
        document.getElementById("puzzle2").classList.add("hide");
        document.getElementById("success2").classList.remove("hide");
    } else {
        alert("答案错误");
    }
}

// 替换状态标记
let doneF = false;
let doneA = false;

// 点击第二个 6 → 输入 F
function toF() {
    let v = prompt("请输入替换字符：")?.trim().toUpperCase();
    if (v === "F") {
        document.getElementById("toF").innerText = "F";
        document.getElementById("toF").classList.remove("clickable");
        document.getElementById("toF").style.color = "#007aff";
        document.getElementById("toF").style.textDecoration = "none";
        doneF = true;
        checkAllDone();
    } else if (v !== null) {
        alert("输入不正确，请重试");
    }
}

// 点击第三个 1 → 输入 A
function toA() {
    let v = prompt("请输入替换字符：")?.trim().toUpperCase();
    if (v === "A") {
        document.getElementById("toA").innerText = "A";
        document.getElementById("toA").classList.remove("clickable");
        document.getElementById("toA").style.color = "#007aff";
        document.getElementById("toA").style.textDecoration = "none";
        doneA = true;
        checkAllDone();
    } else if (v !== null) {
        alert("输入不正确，请重试");
    }
}

// 检查是否完成替换
function checkAllDone() {
    if (doneF && doneA) {
        document.getElementById("toPage3Btn").classList.remove("hide");
    }
}

// 进入下一关
function goPage3() {
    document.getElementById("page2").classList.add("hide");
    document.getElementById("page3").classList.remove("hide");
}
        // ========== 页面3 ==========
        function checkAns3() {
            let ans = document.getElementById("ans3").value.trim();
            if (ans === "中国象棋红炮") {
                document.getElementById("page3").classList.add("hide");
                document.getElementById("page4").classList.remove("hide");
            } else {
                alert("符号不正确");
            }
        }

        // ========== 页面4 ==========
        function checkAns4() {
            let ans = document.getElementById("ans4").value.trim();
            if (ans === "红包") {
                document.getElementById("step4-1").classList.add("hide");
                document.getElementById("step4-2").classList.remove("hide");
            } else {
                alert("答案错误");
            }
        }
        function openRedPacket() {
            alert("恭喜获得优惠券×1！");
            document.getElementById("step4-2").classList.add("hide");
            document.getElementById("step4-3").classList.remove("hide");
        }
    </script>
</body>
</html>
